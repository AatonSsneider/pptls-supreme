<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPTLS Online - By Omnineti</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        text-align: center;
        background: #1a1a1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background 0.3s, color 0.3s;
    }

    body.modo-claro {
        background: #f5f5f5;
        color: #333;
    }

    .contenedor {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        flex: 1;
    }

    h1 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        margin-bottom: 30px;
        color: #4CAF50;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: clamp(14px, 3vw, 18px);
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        transition: transform 0.2s, background 0.3s, box-shadow 0.3s;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    button:hover {
        transform: translateY(-2px);
        background: #45a049;
        box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }

    button:active {
        transform: translateY(0);
    }

    .opcion {
        width: clamp(70px, 15vw, 100px);
        height: clamp(70px, 15vw, 100px);
        font-size: clamp(2rem, 8vw, 3rem);
        background: #2d2d2d;
        border: 3px solid #4CAF50;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        margin: 5px;
    }

    .opcion:hover {
        background: #3d3d3d;
        border-color: #ffc107;
        transform: scale(1.1) rotate(5deg);
    }

    .modo-claro .opcion {
        background: #e0e0e0;
        border-color: #2196F3;
    }

    #login, #juego {
        background: rgba(0,0,0,0.3);
        padding: 30px 20px;
        border-radius: 15px;
        backdrop-filter: blur(5px);
        margin: 20px 0;
    }

    .modo-claro #login, .modo-claro #juego {
        background: rgba(255,255,255,0.7);
    }

    #nombre {
        padding: 12px;
        font-size: 16px;
        border: 2px solid #4CAF50;
        border-radius: 8px;
        width: min(300px, 90%);
        margin: 10px;
        background: #333;
        color: white;
    }

    .modo-claro #nombre {
        background: white;
        color: #333;
        border-color: #2196F3;
    }

    #juego {
        display: none;
    }

    #jugadores {
        font-size: clamp(1.2rem, 4vw, 2rem);
        color: #ffc107;
        margin: 20px 0;
        word-break: break-word;
    }

    #estado {
        font-size: clamp(1rem, 3vw, 1.5rem);
        margin: 25px 0;
        padding: 15px;
        background: rgba(0,0,0,0.5);
        border-radius: 10px;
        border-left: 5px solid #4CAF50;
        white-space: pre-line;
    }

    .modo-claro #estado {
        background: rgba(255,255,255,0.8);
    }

    .panel-control {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 20px 0;
        padding: 15px;
        background: rgba(0,0,0,0.2);
        border-radius: 50px;
    }

    .btn-control {
        background: #2196F3;
        padding: 10px 15px;
        font-size: 14px;
    }

    .btn-control:hover {
        background: #1976D2;
    }

    .btn-peligro {
        background: #f44336;
    }

    .btn-peligro:hover {
        background: #d32f2f;
    }

    .estadisticas {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 30px 0;
        padding: 20px;
        background: rgba(0,0,0,0.4);
        border-radius: 15px;
    }

    .estadisticas h3 {
        grid-column: span 2;
        color: #4CAF50;
        font-size: 1.3rem;
    }

    .estad-jugador {
        background: rgba(255,255,255,0.1);
        padding: 15px;
        border-radius: 10px;
        text-align: left;
    }

    .modo-claro .estad-jugador {
        background: rgba(0,0,0,0.05);
    }

    .estad-jugador h4 {
        color: #ffc107;
        margin-bottom: 10px;
        font-size: 1.1rem;
        word-break: break-word;
    }

    .contador-opciones {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 10px 0;
    }

    .badge-opcion {
        background: #4CAF50;
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .marcador {
        font-size: 2rem;
        font-weight: bold;
        color: #ffc107;
        margin: 15px 0;
        padding: 10px;
        background: rgba(0,0,0,0.3);
        border-radius: 10px;
        display: inline-block;
    }

    .victorias-j1, .victorias-j2 {
        font-size: 1.2rem;
        margin: 5px 0;
    }

    .victorias-j1 {
        color: #4CAF50;
    }

    .victorias-j2 {
        color: #2196F3;
    }

    footer {
        margin-top: 40px;
        padding: 20px;
        background: rgba(0,0,0,0.5);
        color: #888;
        font-size: 14px;
        text-align: center;
        border-top: 1px solid #333;
    }

    .modo-claro footer {
        background: rgba(0,0,0,0.05);
        color: #666;
    }

    .audio-control {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
    }

    .btn-audio {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: #4CAF50;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        border: 2px solid white;
    }

    .btn-audio.off {
        background: #f44336;
    }

    @media (max-width: 600px) {
        .estadisticas {
            grid-template-columns: 1fr;
        }
        .estadisticas h3 {
            grid-column: span 1;
        }
        .panel-control {
            border-radius: 20px;
        }
        .opcion {
            width: clamp(60px, 13vw, 80px);
            height: clamp(60px, 13vw, 80px);
            font-size: clamp(1.8rem, 7vw, 2.5rem);
        }
    }
</style>
</head>
<body>
<div class="contenedor">
    <h1>🪨 Piedra Papel Tijera Lagarto Spock 📄</h1>
    
    <div id="login">
        <input id="nombre" type="text" placeholder="Tu nombre" maxlength="20">
        <button onclick="buscar()">🔍 Buscar partida</button>
    </div>

    <div id="juego">
        <h2 id="jugadores"></h2>
        
        <div class="panel-control">
            <button class="btn-control" onclick="cambiarModo()">🌓 Modo</button>
            <button class="btn-control" onclick="reiniciarJuego()">🔄 Reiniciar</button>
            <button class="btn-control btn-peligro" onclick="salirJuego()">🚪 Salir</button>
        </div>

        <div>
            <button class="opcion" onclick="enviar('piedra')" title="Piedra">🪨</button>
            <button class="opcion" onclick="enviar('papel')" title="Papel">📄</button>
            <button class="opcion" onclick="enviar('tijera')" title="Tijera">✂️</button>
            <button class="opcion" onclick="enviar('lagarto')" title="Lagarto">🦎</button>
            <button class="opcion" onclick="enviar('spock')" title="Spock">🖖</button>
        </div>

        <div class="marcador" id="marcador">
            <div class="victorias-j1" id="victorias-j1">Jugador 1: 0</div>
            <div class="victorias-j2" id="victorias-j2">Jugador 2: 0</div>
        </div>
        
        <h2 id="estado"></h2>

        <div class="estadisticas" id="estadisticas">
            <h3>📊 Estadísticas de opciones</h3>
            <div class="estad-jugador" id="estad-jugador1">
                <h4 id="nombre-j1">Jugador 1</h4>
                <div id="opciones-j1" class="contador-opciones"></div>
            </div>
            <div class="estad-jugador" id="estad-jugador2">
                <h4 id="nombre-j2">Jugador 2</h4>
                <div id="opciones-j2" class="contador-opciones"></div>
            </div>
        </div>

        <button onclick="revancha()" class="btn-control">⚔️ Revancha</button>
    </div>

    <footer>
        design Felipe Aguilera Gómez by omnineti 2026 copyright ©
    </footer>
</div>

<div class="audio-control">
    <button class="btn-audio" onclick="toggleAudio()" id="btnAudio">🔊</button>
</div>

<script>
    // Configuración de audio con URLs funcionales
    let audioActivo = true;
    
    // Usar URLs de audio que se modifico sitio google
    const audioGanador = new Audio('https://actions.google.com/sounds/v1/cartoon/siren_whistle.ogg');
    const audioPerdedor = new Audio('https://actions.google.com/sounds/v1/weapons/machine_gun_hit_car.ogg');
    // const audioPerdedor = new Audio('https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg');
    const audioEmpate = new Audio('https://actions.google.com/sounds/v1/horror/synthetic_insects.ogg');

    // Usar URLs de audio que funcionan originales
    // biblioteca de sonidos google https://developers.google.com/assistant/tools/sound-library?hl=es-419
    // https://developers.google.com/assistant/tools/sound-library/cartoon?hl=es-419
    const audioGanador1 = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
    const audioPerdedor1 = new Audio('https://actions.google.com/sounds/v1/alarms/ding.ogg');
    const audioEmpate1 = new Audio('https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg');
    
    // Configurar audios para que se puedan reproducir múltiples veces
    [audioGanador, audioPerdedor, audioEmpate].forEach(audio => {
        audio.preload = 'auto';
        // Permitir reproducción múltiple
        audio.addEventListener('ended', function() {
            this.currentTime = 0;
        });
    });

    // anterior    const ws = new WebSocket(`ws://${location.host}`);
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss://' : 'ws://'}${location.host}`);
    let jugador;
    let miNombre = '';
    let puntajes = [0, 0];
    let opcionesUsadas = [{}, {}];
    let nombresJugadores = ['', ''];
    let juegoIniciado = false;

    function toggleAudio() {
        audioActivo = !audioActivo;
        const btnAudio = document.getElementById('btnAudio');
        btnAudio.innerText = audioActivo ? '🔊' : '🔇';
        btnAudio.classList.toggle('off', !audioActivo);
        
        // Probar audio al activar
        if (audioActivo) {
            const audioTest = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            audioTest.volume = 0.2;
            audioTest.play().catch(e => console.log('Audio test:', e));
        }
    }

    function reproducirAudio(tipo) {
        if (!audioActivo) {
            console.log('Audio desactivado');
            return;
        }
        
        try {
            let audio;
            switch(tipo) {
                case 'ganador':
                    audio = audioGanador;
                    break;
                case 'perdedor':
                    audio = audioPerdedor;
                    break;
                case 'empate':
                    audio = audioEmpate;
                    break;
                default:
                    return;
            }
            
            // Clonar el audio para poder reproducir múltiples veces
            const audioClone = audio.cloneNode();
            audioClone.volume = 0.7;
            audioClone.play().catch(e => {
                console.log('Error reproduciendo audio:', e);
                // Fallback: intentar con el audio original
                audio.play().catch(e2 => console.log('Error en fallback:', e2));
            });
            
        } catch (e) {
            console.log('Error en reproducción de audio:', e);
        }
    }

    function actualizarEstadisticas() {
        const j1 = nombresJugadores[0] || 'Jugador 1';
        const j2 = nombresJugadores[1] || 'Jugador 2';
        
        document.getElementById('nombre-j1').innerHTML = `👤 ${j1}`;
        document.getElementById('nombre-j2').innerHTML = `👤 ${j2}`;
        
        // Actualizar marcador con nombres
        document.getElementById('victorias-j1').innerHTML = `${j1}: ${puntajes[0]}`;
        document.getElementById('victorias-j2').innerHTML = `${j2}: ${puntajes[1]}`;

        // Actualizar contadores de opciones
        const opcionesJ1 = document.getElementById('opciones-j1');
        const opcionesJ2 = document.getElementById('opciones-j2');
        
        opcionesJ1.innerHTML = '';
        opcionesJ2.innerHTML = '';

        const iconos = {
            piedra: '🪨',
            papel: '📄',
            tijera: '✂️',
            lagarto: '🦎',
            spock: '🖖'
        };

        // Mostrar opciones del jugador 1
        if (Object.keys(opcionesUsadas[0]).length === 0) {
            opcionesJ1.innerHTML = '<span style="color:#888;">Sin datos</span>';
        } else {
            Object.entries(opcionesUsadas[0]).forEach(([opcion, count]) => {
                opcionesJ1.innerHTML += `<span class="badge-opcion">${iconos[opcion] || opcion} ${count}</span>`;
            });
        }

        // Mostrar opciones del jugador 2
        if (Object.keys(opcionesUsadas[1]).length === 0) {
            opcionesJ2.innerHTML = '<span style="color:#888;">Sin datos</span>';
        } else {
            Object.entries(opcionesUsadas[1]).forEach(([opcion, count]) => {
                opcionesJ2.innerHTML += `<span class="badge-opcion">${iconos[opcion] || opcion} ${count}</span>`;
            });
        }
    }

    function buscar() {
        miNombre = document.getElementById("nombre").value.trim();
        if (!miNombre) {
            alert('⚠️ Por favor ingresa tu nombre');
            return;
        }
        ws.send(JSON.stringify({
            tipo: "buscar",
            nombre: miNombre
        }));
        document.getElementById("estado").innerText = "🔍 Buscando partida...";
    }

    function enviar(opcion) {
        if (!juegoIniciado) {
            alert('Esperando a que se una el rival...');
            return;
        }
        document.getElementById("estado").innerText = "⏳ Esperando respuesta del rival...";
        ws.send(JSON.stringify({
            tipo: "movimiento",
            opcion
        }));
    }

    function revancha() {
        ws.send(JSON.stringify({
            tipo: "revancha"
        }));
    }

    function reiniciarJuego() {
        puntajes = [0, 0];
        opcionesUsadas = [{}, {}];
        actualizarEstadisticas();
        document.getElementById("estado").innerText = "🔄 Estadísticas reiniciadas";
    }

    function salirJuego() {
        document.getElementById("login").style.display = "block";
        document.getElementById("juego").style.display = "none";
        puntajes = [0, 0];
        opcionesUsadas = [{}, {}];
        juegoIniciado = false;
        actualizarEstadisticas();
        // Cerrar conexión y reconectar
        ws.close();
        location.reload();
    }

    function cambiarModo() {
        document.body.classList.toggle('modo-claro');
    }

    ws.onmessage = msg => {
        const data = JSON.parse(msg.data);

        if (data.tipo === "asignado") {
            jugador = data.jugador;
            console.log('Asignado como jugador:', jugador);
        }

        if (data.tipo === "inicio") {
            document.getElementById("login").style.display = "none";
            document.getElementById("juego").style.display = "block";
            
            nombresJugadores = data.jugadores;
            document.getElementById("jugadores").innerHTML = 
                `⚔️ ${data.jugadores[0]} vs ${data.jugadores[1]} ⚔️`;
            
            juegoIniciado = true;
            actualizarEstadisticas();
            document.getElementById("estado").innerText = "🎮 ¡Partida iniciada! Elige una opción";
        }

        if (data.tipo === "resultado") {
            let texto = "";
            let audioTipo = "";
            
            // Actualizar contadores de opciones
            opcionesUsadas[0][data.m1] = (opcionesUsadas[0][data.m1] || 0) + 1;
            opcionesUsadas[1][data.m2] = (opcionesUsadas[1][data.m2] || 0) + 1;

            // Determinar resultado según el jugador
            if (data.ganador === 0) {
                texto = `🤝 ¡EMPATE!\n\n${nombresJugadores[0]}: ${data.m1}\n${nombresJugadores[1]}: ${data.m2}`;
                audioTipo = "empate";
            } else if (data.ganador === 1) {
                if (jugador === 0) {
                    texto = `🎉 ¡VICTORIA!\n\n${nombresJugadores[0]}: ${data.m1}\n${nombresJugadores[1]}: ${data.m2}`;
                    puntajes[0]++;
                    audioTipo = "ganador";
                } else {
                    texto = `😢 DERROTA\n\n${nombresJugadores[0]}: ${data.m1}\n${nombresJugadores[1]}: ${data.m2}`;
                    puntajes[0]++; // El jugador 1 gana, pero nosotros somos el 2
                    audioTipo = "perdedor";
                }
            } else if (data.ganador === 2) {
                if (jugador === 1) {
                    texto = `🎉 ¡VICTORIA!\n\n${nombresJugadores[0]}: ${data.m1}\n${nombresJugadores[1]}: ${data.m2}`;
                    puntajes[1]++;
                    audioTipo = "ganador";
                } else {
                    texto = `😢 DERROTA\n\n${nombresJugadores[0]}: ${data.m1}\n${nombresJugadores[1]}: ${data.m2}`;
                    puntajes[1]++; // El jugador 2 gana, pero nosotros somos el 1
                    audioTipo = "perdedor";
                }
            }
            
            document.getElementById("estado").innerText = texto;
            
            // Reproducir audio según resultado
            if (audioActivo) {
                setTimeout(() => reproducirAudio(audioTipo), 100);
            }
            
            actualizarEstadisticas();
        }

        if (data.tipo === "nueva_ronda") {
            document.getElementById("estado").innerHTML = "🔄 Nueva ronda ¡A jugar!";
        }
    };

    // Manejar cierre de conexión
    ws.onclose = () => {
        if (document.getElementById('juego').style.display === 'block') {
            alert('❌ Se perdió la conexión con el servidor');
            salirJuego();
        }
    };

    // Permitir enviar con Enter
    document.getElementById('nombre').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscar();
    });
</script>
</body>
</html>
