<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPTLS Online - By Omnineti</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Segoe UI,Arial;
background:#1a1a1a;
color:#e0e0e0;
text-align:center;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
transition:0.3s;
}

body.claro{
background:#f5f5f5;
color:#333;
}

.contenedor{
max-width:1100px;
margin:auto;
padding:20px;
flex:1;
}

h1{
color:#4CAF50;
font-size:clamp(28px,5vw,40px);
margin-bottom:30px;
}

#login,#juego{
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:15px;
margin:20px 0;
}

body.claro #login,
body.claro #juego{
background:rgba(255,255,255,0.7);
}

#nombre{
padding:12px;
font-size:16px;
border-radius:8px;
border:2px solid #4CAF50;
background:#333;
color:white;
width:260px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
background:#4CAF50;
color:white;
}

.opciones{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.opcion{
width:90px;
height:90px;
font-size:40px;
border-radius:50%;
background:#2d2d2d;
border:3px solid #4CAF50;
display:flex;
align-items:center;
justify-content:center;
margin:8px;
cursor:pointer;
transition:0.25s;
}

.opcion:hover{
transform:scale(1.15);
border-color:#ffc107;
}

#estado{
margin-top:20px;
font-size:20px;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.4);
white-space:pre-line;
}

.estadisticas{
margin-top:30px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.jugador{
background:rgba(0,0,0,0.3);
padding:15px;
border-radius:10px;
min-width:200px;
}

.badge{
background:#4CAF50;
padding:5px 10px;
border-radius:20px;
margin:3px;
display:inline-block;
}

footer{
margin-top:40px;
padding:20px;
background:rgba(0,0,0,0.5);
color:#888;
font-size:14px;
}

.audio{
position:fixed;
bottom:20px;
right:20px;
}

.modo{
position:fixed;
bottom:20px;
left:20px;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🪨 Piedra Papel Tijera Lagarto Spock 📄</h1>

<div id="login">

<input id="nombre" placeholder="Tu nombre">

<br>

<button onclick="buscar()">🔍 Buscar partida</button>
<button onclick="jugarIA()">🤖 Jugar contra IA</button>

</div>

<div id="juego" style="display:none">

<h2 id="jugadores"></h2>

<div class="opciones">

<div class="opcion" onclick="tirar('piedra')">🪨</div>
<div class="opcion" onclick="tirar('papel')">📄</div>
<div class="opcion" onclick="tirar('tijera')">✂️</div>
<div class="opcion" onclick="tirar('lagarto')">🦎</div>
<div class="opcion" onclick="tirar('spock')">🖖</div>

</div>

<h3 id="estado"></h3>

<div class="estadisticas">

<div class="jugador">
<h4 id="nombre1">Jugador 1</h4>
<div id="stats1"></div>
</div>

<div class="jugador">
<h4 id="nombre2">Jugador 2</h4>
<div id="stats2"></div>
</div>

</div>

</div>

<footer>
design Felipe Aguilera Gómez by omnineti 2026 copyright ©
</footer>

</div>

<div class="audio">
<button onclick="toggleAudio()" id="btnAudio">🔊</button>
</div>

<div class="modo">
<button onclick="modo()">🌓</button>
</div>

<script src="game.js"></script>

<script>

let nombres=["",""]
let stats=[{},{}]
let audioActivo=true

const audioWin=new Audio("https://actions.google.com/sounds/v1/cartoon/siren_whistle.ogg")
const audioLose=new Audio("https://actions.google.com/sounds/v1/weapons/machine_gun_hit_car.ogg")
const audioDraw=new Audio("https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg")

const reglas={
piedra:{tijera:"Piedra rompe tijera",lagarto:"Piedra aplasta lagarto"},
papel:{piedra:"Papel cubre piedra",spock:"Papel refuta Spock"},
tijera:{papel:"Tijera corta papel",lagarto:"Tijera decapita lagarto"},
lagarto:{spock:"Lagarto envenena Spock",papel:"Lagarto come papel"},
spock:{tijera:"Spock rompe tijera",piedra:"Spock vaporiza piedra"}
}

function tirar(op){

document.getElementById("estado").innerText="⏳ Esperando al adversario..."

enviar(op)

}

function toggleAudio(){

audioActivo=!audioActivo

document.getElementById("btnAudio").innerText=
audioActivo?"🔊":"🔇"

}

function modo(){

document.body.classList.toggle("claro")

}

function actualizarStats(){

const iconos={
piedra:"🪨",
papel:"📄",
tijera:"✂️",
lagarto:"🦎",
spock:"🖖"
}

let s1=""
let s2=""

for(let k in stats[0])
s1+=`<span class="badge">${iconos[k]} ${stats[0][k]}</span>`

for(let k in stats[1])
s2+=`<span class="badge">${iconos[k]} ${stats[1][k]}</span>`

document.getElementById("stats1").innerHTML=s1
document.getElementById("stats2").innerHTML=s2

}

function sonido(tipo){

if(!audioActivo) return

let a

if(tipo=="win") a=audioWin
if(tipo=="lose") a=audioLose
if(tipo=="draw") a=audioDraw

if(a){

let c=a.cloneNode()
c.volume=0.7
c.play().catch(()=>{})

}

}

function procesarResultado(data){

stats[0][data.m1]=(stats[0][data.m1]||0)+1
stats[1][data.m2]=(stats[1][data.m2]||0)+1

actualizarStats()

let j1=nombres[0] || "Jugador 1"
let j2=nombres[1] || "Jugador 2"

let texto=""

if(data.ganador===0){

texto=`🤝 Empate

${j1} jugó ${data.m1}
${j2} jugó ${data.m2}`

sonido("draw")

return document.getElementById("estado").innerText=texto
}

let regla=""

if(reglas[data.m1] && reglas[data.m1][data.m2])
regla=reglas[data.m1][data.m2]

if(reglas[data.m2] && reglas[data.m2][data.m1])
regla=reglas[data.m2][data.m1]

if(data.ganador===1){

texto=`🏆 ${j1} gana

${regla}

${j1}: ${data.m1}
${j2}: ${data.m2}`

sonido(jugador==0?"win":"lose")
}

if(data.ganador===2){

texto=`🏆 ${j2} gana

${regla}

${j1}: ${data.m1}
${j2}: ${data.m2}`

sonido(jugador==1?"win":"lose")
}

document.getElementById("estado").innerText=texto

}

function esperarWS(){

if(typeof ws==="undefined"){

setTimeout(esperarWS,200)
return

}

const original=ws.onmessage

ws.onmessage=function(msg){

const data=JSON.parse(msg.data)

if(data.tipo==="inicio"){

nombres=data.jugadores

document.getElementById("nombre1").innerText=nombres[0]
document.getElementById("nombre2").innerText=nombres[1]

}

if(data.tipo==="resultado"){

procesarResultado(data)

}

if(original) original(msg)

}

}

esperarWS()

</script>

</body>
</html>
