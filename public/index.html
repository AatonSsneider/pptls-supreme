<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPTLS Online - By Omnineti</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Segoe UI,Arial;
background:#1a1a1a;
color:#e0e0e0;
text-align:center;
margin:0;
display:flex;
flex-direction:column;
min-height:100vh;
}

.contenedor{
max-width:1100px;
margin:auto;
padding:20px;
flex:1;
}

h1{
color:#4CAF50;
font-size:clamp(28px,5vw,40px);
margin-bottom:30px;
text-shadow:2px 2px 6px black;
}

#login,#juego{
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:15px;
margin:20px 0;
backdrop-filter:blur(6px);
}

#nombre{
padding:12px;
font-size:16px;
border-radius:8px;
border:2px solid #4CAF50;
background:#333;
color:white;
width:260px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
background:#4CAF50;
color:white;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

button:hover{
transform:translateY(-2px);
background:#45a049;
}

.opciones{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:20px;
}

.opcion{
width:90px;
height:90px;
font-size:40px;
border-radius:50%;
background:#2d2d2d;
border:3px solid #4CAF50;
display:flex;
align-items:center;
justify-content:center;
margin:8px;
cursor:pointer;
transition:0.25s;
}

.opcion:hover{
transform:scale(1.15) rotate(6deg);
border-color:#ffc107;
background:#3d3d3d;
}

#estado{
margin-top:20px;
font-size:20px;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.4);
}

footer{
margin-top:40px;
padding:20px;
background:rgba(0,0,0,0.5);
color:#888;
font-size:14px;
border-top:1px solid #333;
}

.audio{
position:fixed;
bottom:20px;
right:20px;
}

.audio button{
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🪨 Piedra Papel Tijera Lagarto Spock 📄</h1>

<div id="login">

<input id="nombre" placeholder="Tu nombre">

<br>

<button onclick="buscar()">🔍 Buscar partida</button>
<button onclick="jugarIA()">🤖 Jugar contra IA</button>

</div>

<div id="juego" style="display:none">

<h2 id="jugadores"></h2>

<div class="opciones">

<div class="opcion" onclick="playClick();enviar('piedra')">🪨</div>
<div class="opcion" onclick="playClick();enviar('papel')">📄</div>
<div class="opcion" onclick="playClick();enviar('tijera')">✂️</div>
<div class="opcion" onclick="playClick();enviar('lagarto')">🦎</div>
<div class="opcion" onclick="playClick();enviar('spock')">🖖</div>

</div>

<h3 id="estado"></h3>

</div>

<footer>
design Felipe Aguilera Gómez by omnineti 2026 copyright ©
</footer>

</div>

<div class="audio">
<button onclick="toggleAudio()" id="btnAudio">🔊</button>
</div>

<script src="game.js"></script>

<script>

let audioActivo=true

const clickAudio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

function playClick(){

if(!audioActivo)return

let a=clickAudio.cloneNode()
a.volume=0.3
a.play()

}

function toggleAudio(){

audioActivo=!audioActivo

document.getElementById("btnAudio").innerText=
audioActivo?"🔊":"🔇"

}

</script>

</body>
</html>
