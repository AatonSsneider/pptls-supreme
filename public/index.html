<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de · Piedra Papel Tijera Lagarto Spock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="description" content="Juego online multijugador de Piedra Papel Tijera Lagarto Spock con estadísticas, sonidos y modo claro/oscuro.">
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
        text-align: center;
        background: #1a1a1a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background 0.25s ease, color 0.25s ease;
    }

    body.modo-claro {
        background: #f5f7fa;
        color: #1e2a3a;
    }

    .contenedor {
        max-width: 1300px;
        margin: 0 auto;
        padding: 1.5rem 1.2rem;
        flex: 1;
        width: 100%;
    }

    h1 {
        font-size: clamp(1.6rem, 6vw, 2.6rem);
        margin-bottom: 1.2rem;
        background: linear-gradient(135deg, #4CAF50, #81c784);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        letter-spacing: -0.5px;
        font-weight: 800;
    }

    .modo-claro h1 {
        background: linear-gradient(135deg, #2e7d32, #1976d2);
        background-clip: text;
        -webkit-background-clip: text;
    }

    button {
        padding: 12px 22px;
        margin: 8px;
        font-size: clamp(14px, 3vw, 18px);
        cursor: pointer;
        border: none;
        border-radius: 60px;
        background: #2c3e2f;
        color: white;
        transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        font-weight: 600;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        backdrop-filter: blur(2px);
    }

    button:hover {
        transform: translateY(-3px);
        background: #3e5a41;
        box-shadow: 0 10px 18px rgba(0,0,0,0.25);
    }

    button:active {
        transform: translateY(1px);
    }

    .opcion {
        width: clamp(75px, 14vw, 105px);
        height: clamp(75px, 14vw, 105px);
        font-size: clamp(2.5rem, 7vw, 3.8rem);
        background: #2a2a2a;
        border: 3px solid #4CAF50;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s;
        margin: 8px;
        cursor: pointer;
        box-shadow: 0 6px 0 #1e3a1e;
    }

    .opcion:hover {
        background: #3d3f3d;
        border-color: #ffb74d;
        transform: scale(1.07) rotate(2deg);
        box-shadow: 0 8px 12px rgba(0,0,0,0.3);
    }

    .modo-claro .opcion {
        background: #ffffff;
        border-color: #2196F3;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        color: #1f2b38;
    }

    .modo-claro .opcion:hover {
        background: #e3f2fd;
        border-color: #ff9800;
    }

    #login, #juego {
        background: rgba(0, 0, 0, 0.45);
        padding: 30px 20px;
        border-radius: 42px;
        backdrop-filter: blur(8px);
        margin: 20px 0;
        border: 1px solid rgba(76, 175, 80, 0.3);
        transition: all 0.2s;
    }

    .modo-claro #login, .modo-claro #juego {
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid #cbd5e0;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    #nombre {
        padding: 14px 20px;
        font-size: 1rem;
        border: 2px solid #4CAF50;
        border-radius: 60px;
        width: min(320px, 85%);
        margin: 12px;
        background: #2c2c2c;
        color: #f0f0f0;
        outline: none;
        transition: 0.2s;
        font-weight: 500;
        text-align: center;
    }

    #nombre:focus {
        border-color: #ffb74d;
        box-shadow: 0 0 0 3px rgba(76,175,80,0.3);
    }

    .modo-claro #nombre {
        background: white;
        color: #1e2a3a;
        border-color: #2196F3;
    }

    #juego {
        display: none;
    }

    #jugadores {
        font-size: clamp(1.3rem, 5vw, 2rem);
        color: #ffd966;
        margin: 10px 0 15px;
        font-weight: bold;
        background: rgba(0,0,0,0.3);
        display: inline-block;
        padding: 8px 25px;
        border-radius: 60px;
        letter-spacing: 1px;
    }

    .modo-claro #jugadores {
        background: rgba(0,0,0,0.05);
        color: #1565c0;
    }

    #estado {
        font-size: clamp(1rem, 3.5vw, 1.5rem);
        margin: 20px 0;
        padding: 18px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 32px;
        border-left: 6px solid #4CAF50;
        white-space: pre-line;
        font-weight: 500;
        word-break: break-word;
        line-height: 1.4;
    }

    .modo-claro #estado {
        background: rgba(230, 245, 255, 0.9);
        border-left-color: #1976d2;
    }

    .panel-control {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin: 20px 0 20px;
        padding: 12px 10px;
        background: rgba(0,0,0,0.25);
        border-radius: 80px;
    }

    .btn-control {
        background: #2c3e66;
        padding: 10px 18px;
        font-size: 0.9rem;
        border-radius: 40px;
    }

    .btn-control:hover {
        background: #1e3a5f;
    }

    .btn-peligro {
        background: #c0392b;
    }

    .btn-peligro:hover {
        background: #a82313;
    }

    .marcador {
        font-size: 1.8rem;
        font-weight: bold;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 50px;
        padding: 12px 24px;
        display: inline-flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
        margin: 15px auto;
        backdrop-filter: blur(4px);
    }

    .victorias-j1, .victorias-j2 {
        font-size: 1.3rem;
        font-weight: 700;
        background: #00000055;
        padding: 6px 20px;
        border-radius: 40px;
    }

    .victorias-j1 { color: #b9f6ca; border-left: 3px solid #4caf50; }
    .victorias-j2 { color: #90caf9; border-left: 3px solid #2196f3; }

    .modo-claro .victorias-j1, .modo-claro .victorias-j2 {
        background: #eef2f5;
    }

    .estadisticas {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 30px 0;
        padding: 20px;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 36px;
        backdrop-filter: blur(4px);
    }

    .estadisticas h3 {
        grid-column: span 2;
        color: #ffd966;
        font-size: 1.5rem;
        margin-bottom: 5px;
    }

    .modo-claro .estadisticas h3 {
        color: #1e5f8e;
    }

    .estad-jugador {
        background: rgba(30, 30, 40, 0.7);
        padding: 18px;
        border-radius: 28px;
        text-align: left;
        transition: 0.2s;
    }

    .modo-claro .estad-jugador {
        background: rgba(240, 248, 255, 0.9);
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .estad-jugador h4 {
        color: #ffb74d;
        margin-bottom: 12px;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .modo-claro .estad-jugador h4 {
        color: #0b5e7c;
    }

    .contador-opciones {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
    }

    .badge-opcion {
        background: #2c3e2f;
        padding: 6px 14px;
        border-radius: 60px;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        box-shadow: inset 0 0 0 1px #5a9e5e;
    }

    .modo-claro .badge-opcion {
        background: #e1f5fe;
        color: #01579b;
        box-shadow: inset 0 0 0 1px #2196f3;
    }

    footer {
        margin-top: 50px;
        padding: 18px;
        background: rgba(0, 0, 0, 0.5);
        color: #aaa;
        font-size: 0.8rem;
        text-align: center;
        border-top: 1px solid #2c3e2f;
        font-weight: 400;
    }

    .modo-claro footer {
        background: rgba(0, 0, 0, 0.03);
        color: #5a6e7c;
    }

    .audio-control {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 1100;
    }

    .btn-audio {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: #1e3a2f;
        font-size: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        border: 2px solid white;
        transition: 0.2s;
    }

    .btn-audio.off {
        background: #b71c1c;
    }

    .revancha-btn {
        background: #ff9800;
        color: #1f2a1b;
        font-weight: bold;
        padding: 12px 28px;
        margin-top: 10px;
    }

    @media (max-width: 680px) {
        .estadisticas {
            grid-template-columns: 1fr;
        }
        .estadisticas h3 {
            grid-column: span 1;
        }
        .panel-control {
            border-radius: 30px;
        }
        .marcador {
            gap: 0.8rem;
            font-size: 1.2rem;
        }
        .opcion {
            width: 70px;
            height: 70px;
            font-size: 2.2rem;
            margin: 5px;
        }
    }
</style>
</head>
<body>
<div class="contenedor">
    <h1>🗿 PIEDRA · PAPEL · TIJERA · LAGARTO · SPOCK 🖖</h1>

    <div id="login">
        <input id="nombre" type="text" placeholder="⚡ Tu nombre (ej: Guerrero)" maxlength="22" autocomplete="off">
        <button onclick="buscarPartida()">🔍 BUSCAR PARTIDA ONLINE</button>
    </div>

    <div id="juego">
        <h2 id="jugadores"></h2>
        
        <div class="panel-control">
            <button class="btn-control" onclick="toggleModoClaro()">🌓 MODO CLARO/OSCURO</button>
            <button class="btn-control" onclick="reiniciarMarcadorLocal()">🔄 REINICIAR ESTADÍSTICAS</button>
            <button class="btn-control btn-peligro" onclick="salirYReconectar()">🚪 SALIR DE PARTIDA</button>
        </div>

        <div>
            <button class="opcion" onclick="enviarMovimiento('piedra')" title="Piedra desarma tijera y aplasta lagarto">🗿</button>
            <button class="opcion" onclick="enviarMovimiento('papel')" title="Papel cubre piedra y deshonra a Spock">📄</button>
            <button class="opcion" onclick="enviarMovimiento('tijera')" title="Tijera decapita lagarto y corta papel">✂️</button>
            <button class="opcion" onclick="enviarMovimiento('lagarto')" title="Lagarto devora papel y envenena Spock">🦎</button>
            <button class="opcion" onclick="enviarMovimiento('spock')" title="Spock rompe tijera y vaporiza piedra">🖖</button>
        </div>

        <div class="marcador" id="marcador">
            <div class="victorias-j1" id="victorias-j1">⚡ Jugador 1: 0</div>
            <div class="victorias-j2" id="victorias-j2">⚡ Jugador 2: 0</div>
        </div>
        
        <div id="estado">✨ Esperando rival, elige tu opción ✨</div>

        <div class="estadisticas" id="estadisticas">
            <h3>📊 ESTADÍSTICAS DE OPCIONES (ronda actual)</h3>
            <div class="estad-jugador" id="estad-jugador1">
                <h4 id="nombre-j1">👤 Jugador 1</h4>
                <div id="opciones-j1" class="contador-opciones"></div>
            </div>
            <div class="estad-jugador" id="estad-jugador2">
                <h4 id="nombre-j2">👤 Jugador 2</h4>
                <div id="opciones-j2" class="contador-opciones"></div>
            </div>
        </div>

        <button onclick="solicitarRevancha()" class="btn-control revancha-btn">⚔️ REVANCHA (nueva ronda)</button>
    </div>

    <footer>
        🧠 diseño & desarrollo · Felipe Aguilera Gómez · by omnineti 2026 © · PPTLS SUPREME · sonidos & multijugador real
    </footer>
</div>

<div class="audio-control">
    <button class="btn-audio" onclick="toggleAudioGlobal()" id="btnAudio">🔊</button>
</div>

<script>
    // ------------------- AUDIOS CON URLS FUNCIONALES (Google sound library) ----------------
    let audioActivo = true;
    const audioGanador = new Audio('https://actions.google.com/sounds/v1/cartoon/siren_whistle.ogg');
    const audioPerdedor = new Audio('https://actions.google.com/sounds/v1/weapons/machine_gun_hit_car.ogg');
    const audioEmpate = new Audio('https://actions.google.com/sounds/v1/horror/synthetic_insects.ogg');
    
    [audioGanador, audioPerdedor, audioEmpate].forEach(a => {
        a.preload = 'auto';
        a.addEventListener('ended', () => { a.currentTime = 0; });
    });

    function toggleAudioGlobal() {
        audioActivo = !audioActivo;
        const btn = document.getElementById('btnAudio');
        btn.innerText = audioActivo ? '🔊' : '🔇';
        btn.classList.toggle('off', !audioActivo);
        if (audioActivo) {
            const testAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            testAudio.volume = 0.2;
            testAudio.play().catch(e => console.log("audio test", e));
        }
    }

    function reproducirEfecto(tipo) {
        if (!audioActivo) return;
        try {
            let audio;
            if (tipo === 'ganador') audio = audioGanador;
            else if (tipo === 'perdedor') audio = audioPerdedor;
            else if (tipo === 'empate') audio = audioEmpate;
            else return;
            const clone = audio.cloneNode();
            clone.volume = 0.65;
            clone.play().catch(e => console.log("audio error", e));
        } catch(e) { console.log("error audio", e); }
    }

    // ------------------- WEBSOCKET Y LÓGICA DEL JUEGO (basado en index.html pero mejorado) ----------------
    const ws = new WebSocket(`ws://${location.host}`);
    let jugadorId = null;          // 0 = jugador 1, 1 = jugador 2
    let miNombreGlobal = '';
    let juegoIniciado = false;
    let puntajes = [0, 0];
    let opcionesUsadas = [{}, {}];
    let nombresJugadores = ['', ''];
    
    // Referencias DOM
    const loginDiv = document.getElementById('login');
    const juegoDiv = document.getElementById('juego');
    const nombreInput = document.getElementById('nombre');
    const estadoEl = document.getElementById('estado');
    const jugadoresEl = document.getElementById('jugadores');
    const victoriasJ1Span = document.getElementById('victorias-j1');
    const victoriasJ2Span = document.getElementById('victorias-j2');
    const nombreJ1Span = document.getElementById('nombre-j1');
    const nombreJ2Span = document.getElementById('nombre-j2');
    const opcionesJ1Div = document.getElementById('opciones-j1');
    const opcionesJ2Div = document.getElementById('opciones-j2');

    function actualizarUIEstadisticas() {
        const j1Name = nombresJugadores[0] || 'Jugador 1';
        const j2Name = nombresJugadores[1] || 'Jugador 2';
        nombreJ1Span.innerHTML = `👤 ${j1Name}`;
        nombreJ2Span.innerHTML = `👤 ${j2Name}`;
        victoriasJ1Span.innerHTML = `${j1Name}: ${puntajes[0]}`;
        victoriasJ2Span.innerHTML = `${j2Name}: ${puntajes[1]}`;
        
        const iconos = { piedra: '🗿', papel: '📄', tijera: '✂️', lagarto: '🦎', spock: '🖖' };
        opcionesJ1Div.innerHTML = '';
        opcionesJ2Div.innerHTML = '';
        
        if (Object.keys(opcionesUsadas[0]).length === 0) opcionesJ1Div.innerHTML = '<span style="opacity:0.7;">— sin datos —</span>';
        else {
            for (let [op, cnt] of Object.entries(opcionesUsadas[0])) {
                opcionesJ1Div.innerHTML += `<span class="badge-opcion">${iconos[op] || op} ${cnt}</span>`;
            }
        }
        if (Object.keys(opcionesUsadas[1]).length === 0) opcionesJ2Div.innerHTML = '<span style="opacity:0.7;">— sin datos —</span>';
        else {
            for (let [op, cnt] of Object.entries(opcionesUsadas[1])) {
                opcionesJ2Div.innerHTML += `<span class="badge-opcion">${iconos[op] || op} ${cnt}</span>`;
            }
        }
    }

    function buscarPartida() {
        const nombreRaw = nombreInput.value.trim();
        if (!nombreRaw) {
            alert('⚠️ Escribe tu nombre para jugar');
            return;
        }
        miNombreGlobal = nombreRaw;
        ws.send(JSON.stringify({ tipo: "buscar", nombre: miNombreGlobal }));
        estadoEl.innerText = "🔍 Buscando oponente... espera un momento";
        estadoEl.style.opacity = "1";
    }

    function enviarMovimiento(opcion) {
        if (!juegoIniciado) {
            estadoEl.innerText = "⛔ La partida aún no comienza o el rival no se ha unido.";
            return;
        }
        estadoEl.innerText = "⏳ Enviando jugada, esperando resultado...";
        ws.send(JSON.stringify({ tipo: "movimiento", opcion: opcion }));
    }

    function solicitarRevancha() {
        if (!juegoIniciado) {
            estadoEl.innerText = "No hay partida activa para revancha.";
            return;
        }
        ws.send(JSON.stringify({ tipo: "revancha" }));
        estadoEl.innerText = "🔄 Solicitando nueva ronda...";
    }

    function reiniciarMarcadorLocal() {
        puntajes = [0, 0];
        opcionesUsadas = [{}, {}];
        actualizarUIEstadisticas();
        estadoEl.innerText = "📊 Estadísticas reiniciadas (marcador y opciones).";
    }

    function salirYReconectar() {
        ws.close();
        juegoIniciado = false;
        loginDiv.style.display = "block";
        juegoDiv.style.display = "none";
        puntajes = [0,0];
        opcionesUsadas = [{},{}];
        nombresJugadores = ['',''];
        actualizarUIEstadisticas();
        estadoEl.innerText = "👋 Has salido. Puedes buscar nueva partida.";
        setTimeout(() => location.reload(), 180);
    }

    function toggleModoClaro() {
        document.body.classList.toggle('modo-claro');
    }

    // Procesamiento de mensajes WebSocket
    ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch(e) { console.warn(e); return; }
        
        if (data.tipo === "asignado") {
            jugadorId = data.jugador;
            console.log(`[SERVIDOR] asignado como jugador ${jugadorId}`);
        }
        
        if (data.tipo === "inicio") {
            loginDiv.style.display = "none";
            juegoDiv.style.display = "block";
            nombresJugadores = data.jugadores;
            juegoIniciado = true;
            jugadoresEl.innerHTML = `⚔️ ${data.jugadores[0]}  VS  ${data.jugadores[1]} ⚔️`;
            actualizarUIEstadisticas();
            estadoEl.innerText = "🎮 ¡PARTIDA INICIADA! Elige piedra, papel, tijera, lagarto o Spock.";
        }
        
        if (data.tipo === "resultado") {
            // data contiene: m1, m2, ganador (0 empate, 1 gana jug1, 2 gana jug2)
            const m1 = data.m1, m2 = data.m2;
            opcionesUsadas[0][m1] = (opcionesUsadas[0][m1] || 0) + 1;
            opcionesUsadas[1][m2] = (opcionesUsadas[1][m2] || 0) + 1;
            
            let textoEstado = "";
            let efecto = "";
            const j1nom = nombresJugadores[0];
            const j2nom = nombresJugadores[1];
            
            if (data.ganador === 0) {
                textoEstado = `🤝 EMPATE 🤝\n${j1nom}: ${m1}  |  ${j2nom}: ${m2}`;
                efecto = "empate";
            } 
            else if (data.ganador === 1) {
                puntajes[0] += 1;
                if (jugadorId === 0) efecto = "ganador";
                else efecto = "perdedor";
                textoEstado = `🏆 ¡${j1nom} GANA! 🏆\n${j1nom}: ${m1}  vs  ${j2nom}: ${m2}`;
            } 
            else if (data.ganador === 2) {
                puntajes[1] += 1;
                if (jugadorId === 1) efecto = "ganador";
                else efecto = "perdedor";
                textoEstado = `🏆 ¡${j2nom} GANA! 🏆\n${j2nom}: ${m2}  vs  ${j1nom}: ${m1}`;
            }
            
            estadoEl.innerText = textoEstado;
            reproducirEfecto(efecto);
            actualizarUIEstadisticas();
        }
        
        if (data.tipo === "nueva_ronda") {
            estadoEl.innerText = "🔄 ¡NUEVA RONDA! Elige tu siguiente movimiento.";
            // No reiniciamos opcionesUsadas ni puntajes, solo limpiamos el mensaje de espera
        }
        
        if (data.tipo === "error") {
            estadoEl.innerText = `⚠️ ${data.mensaje || "Error en el servidor"}`;
        }
    };
    
    ws.onopen = () => {
        console.log("✅ Conectado al servidor WebSocket (render)");
        estadoEl.innerText = "🟢 Conectado al servidor. Ingresa tu nombre y busca partida.";
    };
    
    ws.onclose = () => {
        if (juegoDiv.style.display === 'block') {
            alert("❌ Se perdió la conexión con el servidor. Recargando para restablecer.");
            location.reload();
        }
    };
    
    nombreInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarPartida();
    });
    
    // Sincronizar estado inicial
    actualizarUIEstadisticas();
</script>
</body>
</html>
